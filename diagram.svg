<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 520" width="940" height="520" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111c33"/>
      <stop offset="1" stop-color="#0a1120"/>
    </linearGradient>
    <radialGradient id="panelglow" cx="0.22" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#1b2a4a" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#0a1120" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2c4c"/>
      <stop offset="1" stop-color="#16203a"/>
    </linearGradient>
    <linearGradient id="cardDanger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2230"/>
      <stop offset="1" stop-color="#2a1824"/>
    </linearGradient>
    <linearGradient id="cardSafe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16322c"/>
      <stop offset="1" stop-color="#102621"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3e63"/>
      <stop offset="1" stop-color="#1b2942"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs><rect x="1" y="1" width="938" height="518" rx="26" fill="url(#panel)"/><rect x="1" y="1" width="938" height="518" rx="26" fill="url(#panelglow)"/><rect x="1.5" y="1.5" width="937" height="517" rx="25.5" fill="none" stroke="#ffffff" stroke-opacity="0.07"/><text x="42" y="54" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="25" font-weight="700" fill="#eef3fb" letter-spacing="0.2">safe-url-fetch</text><text x="42" y="78" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14.5" fill="#98a6bc">A user-supplied URL, judged before the server connects</text><g filter="url(#shadow)"><rect x="40" y="196" width="176" height="92" rx="18" fill="url(#card)"/></g><rect x="40" y="196" width="176" height="92" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.10"/><text x="64" y="230" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#6f7d93" text-anchor="start" letter-spacing="1.6">USER INPUT</text><text x="64" y="256" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#eef3fb" text-anchor="start" letter-spacing="0">any URL</text><g filter="url(#glow)"><path d="M 404 178.0 L 456.0 204.0 L 456.0 252.0 Q 456.0 270.0 404 298.0 Q 352.0 270.0 352.0 252.0 L 352.0 204.0 Z" fill="url(#shield)" stroke="#5cc7ff" stroke-width="2.6" stroke-opacity="0.95"/></g><path d="M 387.0 234 L 399.0 246.0 L 423.0 220.0" fill="none" stroke="#5cc7ff" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/><text x="404" y="322.0" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#eef3fb" text-anchor="middle">safe-url-fetch</text><text x="404" y="340.0" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#98a6bc" text-anchor="middle">validate, then fetch</text><path d="M 216 240 C 281.0 240, 281.0 234, 337 234" fill="none" stroke="#98a6bc" stroke-opacity="0.55" stroke-width="2.2" stroke-linecap="round"/><path d="M 337 229 L 346 234 L 337 239 Z" fill="#98a6bc" fill-opacity="0.8"/><rect x="280" y="358" width="252" height="30" rx="15.0" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.11"/><circle cx="296" cy="373.0" r="3.2" fill="#5cc7ff"/><text x="310" y="377.5" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#eef3fb">scheme allowlist (http / https)</text><rect x="280" y="396" width="252" height="30" rx="15.0" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.11"/><circle cx="296" cy="411.0" r="3.2" fill="#5cc7ff"/><text x="310" y="415.5" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#eef3fb">resolve every IP, block if internal</text><rect x="280" y="434" width="252" height="30" rx="15.0" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.11"/><circle cx="296" cy="449.0" r="3.2" fill="#5cc7ff"/><text x="310" y="453.5" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#eef3fb">re-check every redirect hop</text><g filter="url(#shadow)"><rect x="620" y="92" width="286" height="158" rx="18" fill="url(#cardDanger)"/></g><rect x="620" y="92" width="286" height="158" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.10"/><rect x="620" y="106" width="4" height="130" rx="2" fill="#ff6f76"/><rect x="644" y="112" width="93" height="28" rx="14" fill="#ff6f76" fill-opacity="0.16" stroke="#ff6f76" stroke-opacity="0.55"/><text x="690" y="131" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="700" fill="#ff6f76" text-anchor="middle" letter-spacing="0.6">BLOCKED</text><rect x="644" y="154" width="244" height="30" rx="15.0" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.11"/><circle cx="660" cy="169.0" r="3.2" fill="#ff6f76"/><text x="674" y="173.5" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#eef3fb">169.254.169.254  (metadata)</text><rect x="644" y="192" width="244" height="30" rx="15.0" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.11"/><circle cx="660" cy="207.0" r="3.2" fill="#ff6f76"/><text x="674" y="211.5" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#eef3fb">127.0.0.1  ·  localhost</text><rect x="644" y="230" width="244" height="30" rx="15.0" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.11"/><circle cx="660" cy="245.0" r="3.2" fill="#ff6f76"/><text x="674" y="249.5" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#eef3fb">10.0.0.0/8  (internal)</text><g filter="url(#shadow)"><rect x="620" y="300" width="286" height="92" rx="18" fill="url(#cardSafe)"/></g><rect x="620" y="300" width="286" height="92" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.10"/><rect x="620" y="314" width="4" height="64" rx="2" fill="#57e0a6"/><rect x="644" y="320" width="93" height="28" rx="14" fill="#57e0a6" fill-opacity="0.16" stroke="#57e0a6" stroke-opacity="0.55"/><text x="690" y="339" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="700" fill="#57e0a6" text-anchor="middle" letter-spacing="0.6">FETCHED</text><text x="644" y="366" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14.5" font-weight="500" fill="#98a6bc" text-anchor="start" letter-spacing="0">public sites only</text><path d="M 460 206 C 540.0 206, 540.0 150, 611 150" fill="none" stroke="#ff6f76" stroke-opacity="0.55" stroke-width="2.2" stroke-linecap="round"/><path d="M 611 145 L 620 150 L 611 155 Z" fill="#ff6f76" fill-opacity="0.8"/><path d="M 460 258 C 540.0 258, 540.0 340, 611 340" fill="none" stroke="#57e0a6" stroke-opacity="0.55" stroke-width="2.2" stroke-linecap="round"/><path d="M 611 335 L 620 340 L 611 345 Z" fill="#57e0a6" fill-opacity="0.8"/><text x="42" y="492" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#6f7d93" text-anchor="start" letter-spacing="0">Fails closed. Anything it cannot prove safe never connects.</text></svg>